<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-image: linear-gradient(45deg, rgb(5, 6, 36), darkblue);
        }
        div{
            background-color: rgba(0, 0, 0, 0.9);
            position:absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 70px;
            border-radius: 20px;
            color: white;
        }
        h1 {
            text-align: center;
        }
        input{
            padding: 15px;
            border: none;
            outline: none;
            font-size: 15px;
        }
        button{
            background-color: deepskyblue;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            color: black;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover{
            background-color: rgb(38, 38, 221);
        }
    </style>
</head>
<body>
<div>
    <h1>Login</h1>
    <input type="text" placeholder="Nome">
    <br><br>
    <input type="password" placeholder="Senha">
    <br><br>
    <button>Entrar</button>
</div>    
</body>
</html>
